<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // Inicializamos el contenedor para la v8
        const container = document.getElementById("doom");
        
        // El método correcto en v8 es jsDos(container)
        jsDos(container).then(ci => {
            // Usamos un objeto de configuración para la v8
            ci.run({
                url: "doom.jsdos" 
            });
        });
    </script>
</body>
</html>
