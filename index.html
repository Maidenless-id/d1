<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <script src="https://js-dos.com/6.22/v7/js-dos.js"></script>
    <link href="https://js-dos.com/6.22/v7/js-dos.css" rel="stylesheet">
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // Esta es la forma más compatible de inicializar js-dos v7
        // js-dos inyecta la variable "Dos" globalmente si se carga bien.
        
        async function startDoom() {
            try {
                const dos = await Dos(document.getElementById("doom"));
                await dos.run("https://archive.org/download/doom_20260622/doom.jsdos");
            } catch (e) {
                console.error("Error al cargar JS-DOS:", e);
                document.body.innerHTML = "<h2 style='color:white;'>Error de carga: Revisa la consola</h2>";
            }
        }

        startDoom();
    </script>
</body>
</html>
