<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // En la v8, el acceso es diferente.
        // Esperamos a que el DOM cargue
        window.addEventListener("load", async () => {
            const container = document.getElementById("doom");
            // La v8 utiliza ci.dosRun(url)
            const ci = await Dos(container, {
                style: "none"
            });
            await ci.run("https://archive.org/download/doom_20260622/doom.jsdos");
        });
    </script>
</body>
</html>
