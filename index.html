<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <link href="https://v8.js-dos.com/latest/js-dos.css" rel="stylesheet">
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // En v8, el componente se inicializa directamente
        const container = document.getElementById("doom");
        
        async function runGame() {
            // v8 crea una instancia y corre directamente sobre ella
            const dos = await Dos(container);
            await dos.run("https://archive.org/download/doom_20260622/doom.jsdos");
        }

        runGame();
    </script>
</body>
</html>
