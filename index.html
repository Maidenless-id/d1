<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <script src="https://cdn.jsdelivr.net/gh/js-dos/js-dos@7.0.0/dist/js-dos.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/js-dos/js-dos@7.0.0/dist/js-dos.css" rel="stylesheet">
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // Verificamos si la librería cargó
        window.addEventListener("load", () => {
            if (typeof Dos === 'undefined') {
                console.error("La librería JS-DOS no cargó. Revisa tu conexión o bloqueadores.");
                document.body.innerHTML = "<h2 style='color:red;'>Error: La librería no cargó.</h2>";
                return;
            }

            Dos(document.getElementById("doom"), {
                workerThread: true,
                style: "none"
            }).run("https://archive.org/download/doom_20260622/doom.jsdos");
        });
    </script>
</body>
</html>
