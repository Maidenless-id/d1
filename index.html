<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        const container = document.getElementById("doom");
        
        jsDos(container).then(dos => {
            // Nota que la URL ahora es el nombre del archivo local
            dos.run("doom.jsdos");
        });
    </script>
</body>
</html>
